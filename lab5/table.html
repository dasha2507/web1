<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 5 - Property Table Final Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8 font-sans">

<div class="max-w-6xl mx-auto bg-white shadow-sm border border-gray-200 rounded-sm">

    <div class="flex flex-wrap items-center justify-between p-2 px-4 border-b border-gray-200 text-sm text-gray-500 bg-white">
        <div class="flex items-center space-x-2">
            <div class="flex items-center pr-2 border-r border-gray-200 mr-2">
                <input type="checkbox" class="w-4 h-4 border-gray-300 rounded cursor-pointer">
                <svg class="w-4 h-4 ml-1 text-gray-400" viewBox="0 0 24 24"><path fill="currentColor" d="M7.41 8.58L12 13.17l4.59-4.59L18 10l-6 6l-6-6l1.41-1.42Z"/></svg>
            </div>

            <div class="flex items-center bg-[#F2F2F2] p-1 rounded-md border border-gray-200">
                <button class="flex items-center gap-2 px-3 py-1 text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M3 11h8V3H3v8m2-6h4v4H5V5m8-2v8h8V3h-8m6 6h-4V5h4v4M3 21h8v-8H3v8m2-6h4v4H5v-4m8 2v8h8v-8h-8m6 6h-4v-4h4v4Z"/></svg>
                    <span class="text-[13px] font-medium">Card</span>
                </button>
                <button class="flex items-center gap-2 px-4 py-1 bg-white text-gray-800 rounded-sm shadow-sm border border-gray-100 font-medium transition">
                    <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                    <span class="text-[13px]">List</span>
                </button>
            </div>
        </div>

        <div class="flex items-center space-x-6 text-[13px]">
            <button class="flex items-center gap-1.5 hover:text-gray-900 transition">
                <svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                Display
            </button>
            <button class="flex items-center gap-1.5 hover:text-gray-900 transition"><svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24"><path fill="currentColor" d="M3 18h6v-2H3v2M3 6v2h18V6H3m0 7h12v-2H3v2Z"/></svg>Sort by</button>
            <button class="flex items-center gap-1.5 hover:text-gray-900 transition"><svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24"><path fill="currentColor" d="M12 16a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2a2 2 0 0 1 2-2m0-6a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2a2 2 0 0 1 2-2m0-6a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2a2 2 0 0 1 2-2Z"/></svg>Actions</button>
        </div>
    </div>

    <div class="overflow-x-auto w-full relative">
        <table class="w-full border-collapse">
            <thead>
            <tr class="bg-[#2D2D2D] text-white text-[11px] font-bold tracking-widest uppercase">
                <th class="sticky left-0 z-30 bg-[#2D2D2D] p-4 w-12 text-center shadow-[1px_0_0_0_rgba(255,255,255,0.1)]"></th>
                <th class="sticky left-12 z-30 bg-[#2D2D2D] py-4 px-4 text-left border-r border-gray-600 min-w-[220px]">Address</th>
                <th class="py-4 px-6 text-right min-w-[220px]">Property Type</th>
                <th class="py-4 px-4 text-center min-w-[80px]">Beds</th>
                <th class="py-4 px-4 text-center min-w-[100px]">Sq Ft</th>
                <th class="py-4 px-4 text-right pr-10 min-w-[150px]">Owner Email</th>
            </tr>
            </thead>

            <tbody class="bg-white text-[13px]">
            <script>
                const data = [
                    { addr: "741 OTT ST", type: "Single Family Residential", beds: 3, sqft: "1,356", hasIcon: true },
                    { addr: "130 HUNTER ST", type: "Single Family Residential", beds: 2, sqft: "1,383", hasIcon: true },
                    { addr: "7685 FREEDOM RD", type: "Mobile/Manufactured Home", beds: 3, sqft: "1,344", hasIcon: false },
                    { addr: "7315 FREEDOM RD", type: "Single Family Residential", beds: 6, sqft: "4,126", hasIcon: true },
                    { addr: "490 FAIREY ST", type: "Single Family Residential", beds: 4, sqft: "2,484", hasIcon: true },
                    { addr: "1051 OTT ST", type: "Single Family Residential", beds: 2, sqft: "850", hasIcon: true }
                ];

                document.write(data.map(row => `
                        <tr class="border-b border-gray-100 hover:bg-gray-100 transition-colors group">
                            <td class="sticky left-0 z-10 bg-white group-hover:bg-gray-100 p-4 text-center shadow-[1px_0_0_0_rgba(0,0,0,0.05)]">
                                <input type="checkbox" class="w-4 h-4 border-gray-300 rounded">
                            </td>
                            <td class="sticky left-12 z-10 bg-white group-hover:bg-gray-100 p-4 border-r border-gray-100 min-w-[220px]">
                                <div class="font-bold text-gray-800 uppercase">${row.addr}</div>
                                <div class="text-[10px] text-gray-400 uppercase mt-0.5">BRANCHVILLE, SC, 29432</div>
                            </td>
                            <td class="p-4 text-right text-gray-500 italic">${row.type}</td>
                            <td class="p-4 text-center font-bold text-gray-700 text-base">${row.beds}</td>
                            <td class="p-4 text-center text-gray-700 font-medium">${row.sqft}</td>
                            <td class="p-4 text-right pr-10">
                                ${row.hasIcon ? `
                                    <svg class="w-5 h-5 ml-auto text-gray-400 hover:text-gray-600 cursor-pointer transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                        <line x1="11" y1="8" x2="11" y2="14"></line>
                                        <line x1="8" y1="11" x2="14" y2="11"></line>
                                    </svg>
                                ` : ''}
                            </td>
                        </tr>
                    `).join(''));
            </script>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
